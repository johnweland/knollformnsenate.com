version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - env | grep -e MAILCHIMP_API_KEY -e MAILCHIMP_AUDIENCE_ID -e MAILCHIMP_API_SERVER -e MAILCHIMP_SUBSCRIBE_STATUS -e MAILCHIMP_NEWSLETTER_TAG >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
